[profile.default]
src = "."
out = "out"
cache_path = "cache"
libs = []
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
# Celo is post-merge; pin paris so no PUSH0 opcode is emitted.
evm_version = "paris"

# Etherscan API v2 (one Etherscan key verifies across chains, Celo = 42220).
[etherscan]
celo = { key = "${ETHERSCAN_API_KEY}", chain = 42220 }
